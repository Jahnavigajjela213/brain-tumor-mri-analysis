services:
  - type: web
    name: neuroguard-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python debug_render.py
    envVars:
      - key: PORT
        value: 8000
      - key: PYTHONPATH
        value: .
      - key: SEGMENTATION_WEIGHTS
        value: unet_trained.pth
